<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftSync - Absensi App</title>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-el { display: none !important; }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="bg-blue-600 p-8 text-center text-white">
                <div class="bg-white/20 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                    <i data-lucide="clock" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight mb-2">OnTime</h1>
                <p class="text-blue-100">Sistem Absensi Pribadi</p>
            </div>
            <div class="p-8">
                <div id="login-error" class="hidden-el bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-6 flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span>ID atau PIN salah!</span>
                </div>
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">ID Karyawan</label>
                        <input type="text" id="input-id" placeholder="pagi / admin" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">PIN Akses</label>
                        <input type="password" id="input-pin" placeholder="1234 atau admin" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button type="submit" class="w-full bg-blue-700 hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg transition-transform active:scale-95">Masuk</button>
                </form>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden-el fade-in">
        <header class="bg-white shadow-sm sticky top-0 z-10 p-4">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white p-2 rounded-lg"><i data-lucide="clock" class="w-5 h-5"></i></div>
                    <h1 class="text-xl font-bold">Disiplin v1</h1>
                </div>
                <button onclick="handleLogout()" class="text-red-500 font-semibold">Logout</button>
            </div>
        </header>
        
        <main class="max-w-4xl mx-auto px-4 mt-10 text-center">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-lg">
                <h2 id="display-date" class="text-lg opacity-90 mb-2">...</h2>
                <div id="display-time" class="text-5xl md:text-6xl font-bold mb-4">00:00:00</div>
                <button id="btn-clock-in" onclick="handleClockIn()" class="bg-white text-blue-700 font-bold py-3 px-8 rounded-full shadow-md hover:bg-blue-50 transition-all">CLOCK IN</button>
                <div id="msg-selesai" class="hidden-el bg-green-500 text-white p-3 rounded-xl mt-4">Berhasil Absen!</div>
            </div>
        </main>
    </div>

    <script>
        const mockUsers = {
            pagi: { id: 'pagi', nama: 'Revi Andika', pin: '1234' },
            admin: { id: 'admin', nama: 'Administrator', pin: 'admin' }
        };

        // Initialize Icons
        lucide.createIcons();

        // Clock Function
        setInterval(() => {
            const now = new Date();
            if(document.getElementById('display-time')) {
                document.getElementById('display-time').innerText = now.toLocaleTimeString('id-ID');
                document.getElementById('display-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }
        }, 1000);

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('input-id').value;
            const pin = document.getElementById('input-pin').value;
            
            if (mockUsers[id] && mockUsers[id].pin === pin) {
                document.getElementById('login-screen').classList.add('hidden-el');
                document.getElementById('main-app').classList.remove('hidden-el');
            } else {
                document.getElementById('login-error').classList.remove('hidden-el');
            }
        });

        function handleClockIn() {
            document.getElementById('btn-clock-in').classList.add('hidden-el');
            document.getElementById('msg-selesai').classList.remove('hidden-el');
        }

        function handleLogout() {
            location.reload(); // Cara paling cepat untuk logout & reset state
        }
    </script>
</body>
</html>
